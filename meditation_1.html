<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Your Daily Meditation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #141920;
    --surface2: #1a2230;
    --border: rgba(255,255,255,0.07);
    --text: #e8e0d4;
    --muted: rgba(232,224,212,0.45);
    --hint: rgba(232,224,212,0.25);
    --mon: #5DCAA5;
    --wed: #9B8FD4;
    --fri: #E8A94C;
    --sun: #D4768A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  /* Animated background orb */
  .bg-orb {
    position: fixed; top: -20%; left: -20%; width: 70vw; height: 70vw;
    border-radius: 50%; opacity: 0.06; filter: blur(60px);
    background: var(--accent, var(--mon));
    animation: orbPulse 8s ease-in-out infinite; pointer-events: none; z-index: 0;
    transition: background 1.5s ease;
  }
  .bg-orb2 {
    position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vw;
    border-radius: 50%; opacity: 0.04; filter: blur(80px);
    background: var(--accent, var(--mon));
    animation: orbPulse 12s ease-in-out infinite reverse; pointer-events: none; z-index: 0;
    transition: background 1.5s ease;
  }
  @keyframes orbPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 20px); }

  /* Day selector */
  .day-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .db { padding: 14px 6px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .db.on { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main content */
  .main { flex: 1; display: flex; flex-direction: column; padding: 28px 24px 20px; overflow: hidden; }

  /* Session header */
  .session-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; font-style: italic; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
  .session-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 28px; }

  /* Progress ring */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
  .ring-svg { width: 130px; height: 130px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 2; }
  .ring-fill { fill: none; stroke: var(--accent, var(--mon)); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 376; stroke-dashoffset: 376; transition: stroke-dashoffset 1s linear, stroke 1.5s ease; }
  .ring-center { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 130px; height: 130px; }
  .ring-wrap { position: relative; }
  .ring-time { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--text); line-height: 1; }
  .ring-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  /* Step dots */
  .step-dots { display: flex; gap: 6px; align-items: center; justify-content: center; margin-bottom: 24px; }
  .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--hint); transition: all 0.4s; }
  .sdot.done { background: var(--accent); opacity: 0.5; }
  .sdot.cur { width: 20px; border-radius: 3px; background: var(--accent); }

  /* Step content */
  .step-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .step-phase { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .step-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 14px; line-height: 1.3; }
  .step-body { font-size: 15px; color: rgba(232,224,212,0.7); line-height: 1.8; margin-bottom: 16px; }
  .breath-card { background: var(--surface2); border-left: 2px solid var(--accent); border-radius: 0 8px 8px 0; padding: 12px 14px; font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
  .breath-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; font-weight: 400; }

  /* Status */
  .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-top: 1px solid var(--border); flex-shrink: 0; gap: 10px; }
  .status-text { font-size: 12px; color: var(--muted); }
  .status-pill { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); letter-spacing: 0.05em; }
  .status-pill.active { border-color: var(--accent); color: var(--accent); }

  /* Begin screen */
  .begin-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
  .begin-eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .begin-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; font-style: italic; color: var(--text); line-height: 1.2; margin-bottom: 12px; }
  .begin-desc { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 280px; margin: 0 auto 36px; }
  .begin-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 40px; border-radius: 40px; cursor: pointer; transition: all 0.3s; }
  .begin-btn:active { transform: scale(0.97); }

  /* Controls overlay at bottom when playing */
  .ctrl-row { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 0 24px 4px; flex-shrink: 0; }
  .ctrl-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.05em; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn.pause-btn { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* Volume */
  .vol-row { display: flex; gap: 16px; align-items: center; padding: 8px 24px; flex-shrink: 0; }
  .vl { font-size: 11px; color: var(--hint); white-space: nowrap; letter-spacing: 0.05em; min-width: 38px; }
  input[type=range] { flex: 1; -webkit-appearance: none; height: 2px; background: var(--border); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text); cursor: pointer; }

  .hidden { display: none !important; }

  /* Breathing animation circle */
  .breath-anim { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent); opacity: 0; margin: 0 auto 12px; transition: opacity 0.5s; }
  .breath-anim.show { opacity: 0.4; animation: breathe 5s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scale(1);}50%{transform:scale(1.4);} }

  /* Fade in */
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  .fade-in { animation: fadeIn 0.6s ease forwards; }
</style>
</head>
<body>
<div class="bg-orb" id="orb1"></div>
<div class="bg-orb2" id="orb2"></div>

<div class="app">
  <!-- Day bar -->
  <div class="day-bar">
    <button class="db on" onclick="loadDay(0,this)">Mon</button>
    <button class="db" onclick="loadDay(1,this)">Wed</button>
    <button class="db" onclick="loadDay(2,this)">Fri</button>
    <button class="db" onclick="loadDay(3,this)">Sun</button>
  </div>

  <!-- Begin screen -->
  <div class="begin-screen" id="beginScreen">
    <div class="begin-eyebrow" id="bEyebrow">Monday · 20 min</div>
    <div class="begin-title" id="bTitle">Root into<br>self-worth</div>
    <div class="begin-desc">Your session will flow completely on its own. Ambient music plays throughout. Just press begin, close your eyes, and follow the voice.</div>
    <button class="begin-btn" onclick="beginSession()">Begin Session</button>
  </div>

  <!-- Player screen -->
  <div class="main hidden" id="playerScreen">
    <div class="session-name" id="sName">Root into self-worth</div>
    <div class="session-sub" id="sSub">Step 1 of 5 · Monday</div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 130 130">
        <circle class="ring-track" cx="65" cy="65" r="60"/>
        <circle class="ring-fill" id="ringFill" cx="65" cy="65" r="60"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="rTime">—</div>
        <div class="ring-label" id="rLabel">remaining</div>
      </div>
    </div>

    <div class="step-dots" id="stepDots"></div>

    <div class="step-content" id="stepContent">
      <div class="step-phase" id="sPhase">Arriving</div>
      <div class="step-title fade-in" id="sTitle">Settle in</div>
      <div class="breath-anim" id="breathAnim"></div>
      <div class="step-body fade-in" id="sBody"></div>
      <div id="breathCard" class="hidden">
        <div class="breath-card fade-in">
          <div class="breath-label">Breathwork</div>
          <div id="breathText"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="ctrl-row hidden" id="ctrlRow">
    <button class="ctrl-btn" onclick="skipStep()">Skip step</button>
    <button class="ctrl-btn pause-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="ctrl-btn" onclick="restartSession()">Restart</button>
  </div>

  <div class="vol-row hidden" id="volRow">
    <span class="vl">Music</span>
    <input type="range" id="mvol" min="0" max="1" step="0.05" value="0.25" oninput="setMusicVol(this.value)">
    <span class="vl">Voice</span>
    <input type="range" id="vvol" min="0" max="1" step="0.05" value="1" oninput="voiceVol=parseFloat(this.value)">
  </div>

  <div class="status-bar hidden" id="statusBar">
    <span class="status-text" id="statusText">Playing</span>
    <span class="status-pill active" id="statusPill">Live</span>
  </div>
</div>

<script>
var SESSIONS = [
  { title:"Root into self-worth", day:"Monday", mins:20, accent:"#5DCAA5", steps:[
    { name:"Arrive & settle", phase:"Opening", dur:120,
      text:"Sit or lie comfortably. Close your eyes. Feel the full weight of your body being held. Let your shoulders soften. Unclench your jaw. Let your hands be still. You don't have to do anything yet. Just arrive here, in this moment.",
      breath:"Box breathing: inhale slowly for 4 counts, hold for 4, exhale for 4, hold for 4. Feel each cycle slow your mind a little more." },
    { name:"Body scan", phase:"Listening", dur:180,
      text:"Begin at the top of your head. Notice any tension there and breathe into it gently. Move down through your face, your neck and shoulders. Down through your chest, your belly. Into your hips, your legs, all the way to the soles of your feet. Your body holds your story. You are simply listening.",
      breath:null },
    { name:"Heart connection", phase:"Opening", dur:240,
      text:"Place one hand on your heart. Feel its warmth under your palm. With each slow exhale, say silently to yourself: I am enough, exactly as I am right now. Don't force the words. Just offer them, gently, breath by breath. Let them land wherever they can.",
      breath:"Breathe into your chest for 5 counts. Exhale for 5. With each breath, imagine warmth spreading outward from your heart." },
    { name:"Inquiry", phase:"Going Deeper", dur:480,
      text:"Ask yourself softly, without judgment: where in my body do I feel the urge to prove myself? Don't answer with your thinking mind. Just feel where that energy lives. A tightness in the chest, maybe. A held breath. A heaviness. Breathe into that place gently. You are not fixing anything. You are simply witnessing. You are already whole. Your worth is not something you earn.",
      breath:null },
    { name:"Close & seal", phase:"Integration", dur:180,
      text:"Take a slow, full breath in. Imagine a version of yourself who knows, without question, that they are enough. See how they hold their body. How they breathe. Let that image fill you from the inside. Take two more slow breaths. Then gently, let your eyes open. Carry this with you.",
      breath:null }
  ]},
  { title:"Release the need for approval", day:"Wednesday", mins:20, accent:"#9B8FD4", steps:[
    { name:"Arrive & settle", phase:"Opening", dur:120,
      text:"Sit quietly. Let your breath be completely natural. Notice anything you're carrying from the last two days. Thoughts, interactions, the weight of being seen or not seen. You don't need to carry any of it into this space. Set it down here.",
      breath:"4-7-8 breath: inhale through your nose for 4 counts, hold for 7, exhale slowly through your mouth for 8. This tells your nervous system it is safe to let go." },
    { name:"Name the pattern", phase:"Witnessing", dur:240,
      text:"Bring to mind a recent moment when you felt that flicker of anxiety about what someone thought of you. Don't relive it emotionally. Just observe it, like watching a scene in a film from a comfortable distance. Notice what you wanted from that person. Approval? Reassurance? Validation of your worth? Just name it quietly.",
      breath:null },
    { name:"Compassion drop", phase:"Releasing", dur:300,
      text:"That need for approval didn't come from nowhere. It came from a time when being accepted felt like survival. That part of you was doing its best. So now, quietly, thank it. And then imagine setting it down, like a heavy bag you've been carrying for a very long time. You are allowed to rest. You don't need it here.",
      breath:"Sighing release: breathe fully in, then add one short sharp second inhale at the very top, then let the exhale go completely through your mouth. A long, audible sigh. Let tension leave with it." },
    { name:"Inquiry", phase:"Going Deeper", dur:360,
      text:"Ask yourself: what would I do, say, or be if I wasn't watching myself through someone else's eyes? Let images, feelings, or words arise without editing them. What feels most true when no one is watching? Your value does not change based on what others think of you. Say it quietly inside: I approve of myself.",
      breath:null },
    { name:"Close & seal", phase:"Integration", dur:180,
      text:"Three slow breaths. With each one, feel your own presence more clearly. Not performing. Not being watched. Just here, in your own body, living your own life. When you are ready, gently open your eyes.",
      breath:null }
  ]},
  { title:"Confident presence", day:"Friday", mins:20, accent:"#E8A94C", steps:[
    { name:"Arrive & energize", phase:"Opening", dur:180,
      text:"Sit tall. Roll your shoulders back and down. Feel the ground firmly beneath you. Let your spine lengthen. Confidence begins in the body long before it reaches the mind. We are starting here, in the physical.",
      breath:"Power breath: 10 full rhythmic breaths, deep into the belly through the nose, out through the mouth. Each one a little fuller. Then one final deep inhale, hold for 10 seconds, and release slowly. Feel what that builds." },
    { name:"Embodiment", phase:"Grounding", dur:180,
      text:"Notice how you are sitting right now. Are you taking up space? You are allowed to. Feel the length of your spine, the width of your shoulders. Confidence is not arrogance. It is simply being at home in your own body. Settle into it.",
      breath:null },
    { name:"Victory recall", phase:"Building", dur:300,
      text:"Bring to mind one moment from this week when you acted from your own values. It doesn't have to be dramatic. Even a small moment of honesty, of kindness to yourself, of following through on something. Let that moment live in your body. Where do you feel it? Let it expand from there. This is what real confidence feels like from the inside.",
      breath:"Expansive breath: inhale slowly for 5 counts, wide and full. Hold for 2. Exhale for 6. Let each breath expand the feeling of capability already living inside you." },
    { name:"Inquiry", phase:"Going Deeper", dur:360,
      text:"Ask yourself: what would I do next week if I fully trusted myself? Let the answer come from your gut, not from your fear of getting it wrong. Stay with whatever arises. You trust your own judgment. You are capable. You move forward from your values, not from the need to prove anything.",
      breath:null },
    { name:"Close & seal", phase:"Integration", dur:180,
      text:"Picture yourself moving through next week. Unhurried. Grounded. At ease in who you are. You know yourself. Three slow breaths. Then open your eyes and carry that knowing forward.",
      breath:null }
  ]},
  { title:"Ease into the unknown", day:"Sunday", mins:25, accent:"#D4768A", steps:[
    { name:"Arrive & soften", phase:"Opening", dur:180,
      text:"Lie down or sit as comfortably as you can. This is your deepest session of the week. There is no agenda here and nothing to perform. Let the whole week dissolve around you. The future is not here yet. Right now there is only this breath, and then the next.",
      breath:"Extended exhale: inhale for 4 counts, exhale for 8. The exhale twice as long as the inhale is the most direct signal to your body that you are completely safe. Stay with this rhythm." },
    { name:"Welcome the anxiety", phase:"Witnessing", dur:300,
      text:"Instead of pushing away any worry about the future, try something different. Invite it in as a guest. Where does it live in your body? Your chest, your throat, your stomach? Just locate it. What does it actually feel like, beneath the story around it? Anxiety is often just energy looking for somewhere to land. Breathe around it, gently.",
      breath:null },
    { name:"Leaf on water", phase:"Releasing", dur:300,
      text:"Imagine sitting beside a slow, quiet river. Take any fear or worry about the future and place it carefully on a leaf. Watch the leaf catch the current and begin to drift away. You don't need to hold it. You don't need to fight it or solve it right now. Just watch it move. You can always return to it. But for now, let it float.",
      breath:"Ocean breath: breathe in and out through your nose with a slight constriction at the back of the throat. A soft, steady ocean sound. This anchors you completely in this moment." },
    { name:"Inquiry", phase:"Going Deeper", dur:480,
      text:"Ask yourself: what is one thing I can trust about myself, no matter what the future holds? Let the answer be simple. You don't need a long list. Maybe it is your resilience. Maybe it is your love for the people around you. Maybe it is simply that you have always found a way. Sit with that one true thing. You trust yourself to handle what comes. You do not need to know everything now.",
      breath:null },
    { name:"Close & integrate", phase:"Integration", dur:240,
      text:"Place one hand on your heart and one on your belly. Feel your own warmth. Your own steadiness. This is you. This is home. Five slow, complete breaths here. Then, gently, open your eyes. Before you move, write one word in your journal that captures what arose today.",
      breath:null }
  ]}
];

var C = { di:0, si:0, playing:false, paused:false, rem:0, stepDur:0, iv:null, prem:0, pauseMode:false, started:false };
var audioCtx = null, musicGain = null, musicNodes = [], voiceVol = 1.0;
var ACCENT = "#5DCAA5";

function setAccent(col) {
  ACCENT = col;
  document.documentElement.style.setProperty('--accent', col);
  document.getElementById('orb1').style.background = col;
  document.getElementById('orb2').style.background = col;
  document.getElementById('ringFill').style.stroke = col;
}

function loadDay(i, el) {
  stopAll();
  C.di = i; C.si = 0; C.started = false;
  document.querySelectorAll('.db').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  var s = SESSIONS[i];
  setAccent(s.accent);
  document.getElementById('bEyebrow').textContent = s.day + ' · ' + s.mins + ' min';
  document.getElementById('bTitle').innerHTML = s.title.replace(' into ', '<br>into ').replace(' the need ', '<br>the need ').replace(' presence', '<br>presence').replace(' into the', '<br>into the');
  showBegin();
}

function showBegin() {
  document.getElementById('beginScreen').classList.remove('hidden');
  document.getElementById('playerScreen').classList.add('hidden');
  document.getElementById('ctrlRow').classList.add('hidden');
  document.getElementById('volRow').classList.add('hidden');
  document.getElementById('statusBar').classList.add('hidden');
}

function showPlayer() {
  document.getElementById('beginScreen').classList.add('hidden');
  document.getElementById('playerScreen').classList.remove('hidden');
  document.getElementById('ctrlRow').classList.remove('hidden');
  document.getElementById('volRow').classList.remove('hidden');
  document.getElementById('statusBar').classList.remove('hidden');
}

function beginSession() {
  C.started = true; C.si = 0;
  try { initAudio(); } catch(e) {}
  showPlayer();
  var s = SESSIONS[C.di];
  document.getElementById('sName').textContent = s.title;
  renderStep();
  startStep();
}

function renderStep() {
  var s = SESSIONS[C.di], step = s.steps[C.si];
  document.getElementById('sSub').textContent = 'Step ' + (C.si+1) + ' of ' + s.steps.length + ' · ' + s.day;
  document.getElementById('sPhase').textContent = step.phase;
  document.getElementById('sTitle').textContent = step.name;
  document.getElementById('sBody').textContent = step.text;
  var bc = document.getElementById('breathCard');
  var ba = document.getElementById('breathAnim');
  if (step.breath) {
    bc.classList.remove('hidden');
    document.getElementById('breathText').textContent = step.breath;
    ba.classList.add('show');
  } else {
    bc.classList.add('hidden');
    ba.classList.remove('show');
  }
  renderDots();
  C.rem = step.dur; C.stepDur = step.dur;
  updTimer(); updRing();
}

function renderDots() {
  var s = SESSIONS[C.di], h = '';
  for (var i = 0; i < s.steps.length; i++) {
    if (i < C.si) h += '<div class="sdot done"></div>';
    else if (i === C.si) h += '<div class="sdot cur"></div>';
    else h += '<div class="sdot"></div>';
  }
  document.getElementById('stepDots').innerHTML = h;
}

function updTimer() {
  if (C.pauseMode) { document.getElementById('rTime').textContent = C.prem; document.getElementById('rLabel').textContent = 'rest'; return; }
  var m = Math.floor(C.rem/60), s = C.rem%60;
  document.getElementById('rTime').textContent = m + ':' + (s<10?'0':'') + s;
  document.getElementById('rLabel').textContent = 'remaining';
}

function updRing() {
  var pct = C.stepDur > 0 ? (C.rem / C.stepDur) : 1;
  var circ = 2 * Math.PI * 60;
  document.getElementById('ringFill').style.strokeDashoffset = circ * pct;
}

function startStep() {
  C.playing = true; C.paused = false; C.pauseMode = false;
  var step = SESSIONS[C.di].steps[C.si];
  var txt = step.name + '. ' + step.text + (step.breath ? ' Breathwork: ' + step.breath : '');
  speak(txt);
  clearInterval(C.iv);
  C.iv = setInterval(tick, 1000);
  setStatus('Playing', true);
  document.getElementById('pauseBtn').textContent = 'Pause';
}

function tick() {
  if (C.paused) return;
  if (C.pauseMode) {
    C.prem--;
    document.getElementById('rTime').textContent = C.prem;
    document.getElementById('rLabel').textContent = 'breathe';
    if (C.prem <= 0) {
      C.pauseMode = false;
      var s = SESSIONS[C.di];
      if (C.si < s.steps.length - 1) {
        C.si++;
        renderStep();
        startStep();
      } else {
        clearInterval(C.iv);
        C.playing = false;
        document.getElementById('rTime').textContent = '✓';
        document.getElementById('rLabel').textContent = 'complete';
        document.getElementById('ringFill').style.strokeDashoffset = 0;
        setStatus('Complete', true);
        speak('Your meditation is complete. You did beautifully. Take a moment before you move. Well done.');
      }
    }
    return;
  }
  C.rem--;
  updTimer(); updRing();
  if (C.rem <= 0) {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    C.pauseMode = true; C.prem = 14;
    setStatus('Rest', false);
  }
}

function togglePause() {
  if (C.paused) {
    C.paused = false;
    document.getElementById('pauseBtn').textContent = 'Pause';
    setStatus('Playing', true);
    var step = SESSIONS[C.di].steps[C.si];
    speak(step.text);
  } else {
    C.paused = true;
    document.getElementById('pauseBtn').textContent = 'Resume';
    setStatus('Paused', false);
    if (window.speechSynthesis) window.speechSynthesis.cancel();
  }
}

function skipStep() {
  if (!C.started) return;
  clearInterval(C.iv);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  var s = SESSIONS[C.di];
  if (C.si < s.steps.length - 1) { C.si++; renderStep(); startStep(); }
}

function restartSession() {
  stopAll(); C.started = false;
  showBegin();
}

function setStatus(txt, active) {
  document.getElementById('statusText').textContent = txt;
  var p = document.getElementById('statusPill');
  p.textContent = active ? 'Live' : txt;
  p.className = 'status-pill' + (active ? ' active' : '');
}

function speak(txt) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(function() {
    var u = new SpeechSynthesisUtterance(txt);
    u.rate = 0.85; u.pitch = 0.9; u.volume = voiceVol;
    var vs = window.speechSynthesis.getVoices();
    var v = vs.find(function(v){ return v.lang==='en-US' && (v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Moira')); })
           || vs.find(function(v){ return v.lang==='en-US' && !v.name.toLowerCase().includes('male'); })
           || vs.find(function(v){ return v.lang==='en-US'; })
           || vs.find(function(v){ return v.lang.startsWith('en'); });
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }, 300);
}

// ── Ambient generative music ──────────────────────────────────────
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = parseFloat(document.getElementById('mvol').value);
  musicGain.connect(audioCtx.destination);

  // Reverb convolver for depth
  var revLen = audioCtx.sampleRate * 3;
  var revBuf = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
  for (var ch = 0; ch < 2; ch++) {
    var data = revBuf.getChannelData(ch);
    for (var i = 0; i < revLen; i++) data[i] = (Math.random()*2-1) * Math.pow(1-(i/revLen),2.5);
  }
  var rev = audioCtx.createConvolver(); rev.buffer = revBuf;
  var revGain = audioCtx.createGain(); revGain.gain.value = 0.35;
  rev.connect(revGain); revGain.connect(musicGain);

  function tone(freq, start, dur, vol, wave) {
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    var att = Math.min(3, dur*0.2), rel = Math.min(4, dur*0.3);
    osc.type = wave || 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(vol, start+att);
    g.gain.setValueAtTime(vol, start+dur-rel);
    g.gain.linearRampToValueAtTime(0, start+dur);
    osc.connect(g); g.connect(musicGain); g.connect(rev);
    osc.start(start); osc.stop(start+dur);
    musicNodes.push(osc);
  }

  var now = audioCtx.currentTime + 0.5;
  // Pentatonic scale in D — calming, non-dissonant
  var pent = [146.83, 174.61, 196.00, 220.00, 261.63, 293.66, 349.23, 392.00, 440.00];
  var bass  = [73.42, 87.31, 98.00, 110.00];

  // Slow pad chords — every 20 seconds
  var padSeq = [[0,2,4],[2,4,6],[0,3,5],[1,3,5],[0,2,5]];
  for (var p = 0; p < 80; p++) {
    var chord = padSeq[p % padSeq.length];
    var t = now + p * 20;
    chord.forEach(function(ni) { tone(pent[ni], t, 22, 0.035, 'sine'); });
    chord.forEach(function(ni) { tone(pent[ni]*2, t+1, 20, 0.012, 'sine'); });
  }

  // Bass drones — every 24 seconds
  for (var b = 0; b < 60; b++) {
    tone(bass[b%bass.length], now + b*24, 26, 0.04, 'sine');
  }

  // Gentle melody — sparse notes every 4-7 seconds
  var melSeq = [0,2,4,2,4,6,4,2,0,4,2,6,4,0,2,4,6,4,2,0];
  var mt = now + 4;
  for (var m = 0; m < 200; m++) {
    var ni = melSeq[m % melSeq.length];
    tone(pent[ni], mt, 6, 0.025, 'sine');
    mt += 4 + (m % 3) * 1.5;
  }
}

function setMusicVol(v) { if (musicGain) musicGain.gain.value = parseFloat(v); }

function stopAll() {
  C.playing = false; C.paused = false; C.pauseMode = false;
  clearInterval(C.iv);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  musicNodes.forEach(function(n){ try{n.stop();}catch(e){} });
  musicNodes = [];
  if (musicGain) { musicGain.disconnect(); musicGain = null; }
  if (audioCtx) { try{audioCtx.close();}catch(e){} audioCtx = null; }
}

// Load voices async
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = function(){};
}

// Init day 0
setAccent(SESSIONS[0].accent);
</script>
